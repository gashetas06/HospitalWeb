<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar Contraseña</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f172a; color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
    display: flex; height: 100vh; overflow: hidden;
  }
  .sidebar {
    width: 72px; background: #1e293b;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 0; gap: 8px; flex-shrink: 0;
  }
  .sidebar .logo { font-size: 1.6rem; margin-bottom: 16px; }
  .sidebar a {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #94a3b8; text-decoration: none; font-size: 0.55rem; gap: 3px;
    transition: background .2s, color .2s;
  }
  .sidebar a i { font-size: 1.2rem; }
  .sidebar a:hover { background: #334155; color: #f8fafc; }
  .sidebar a.active { background: #334155; color: #34d399; }
  .main { flex: 1; overflow-y: auto; padding: 32px 36px; display: flex; flex-direction: column; gap: 24px; }
  .form-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 18px;
    padding: 32px; max-width: 480px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .form-group label { font-size: .75rem; text-transform: uppercase; letter-spacing: .07em; color: #64748b; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-wrap i { position: absolute; left: 14px; color: #475569; }
  .input-wrap input {
    width: 100%; background: #0f172a; border: 1px solid #334155;
    border-radius: 10px; padding: 12px 14px 12px 40px;
    color: #e2e8f0; font-size: .9rem; outline: none; transition: border .2s;
  }
  .input-wrap input:focus { border-color: #34d399; }
  .btn-save {
    background: #14432a; color: #34d399; border: none;
    border-radius: 12px; padding: 13px 28px; font-size: .95rem;
    font-weight: 700; cursor: pointer; transition: background .2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-save:hover { background: #1a5c39; }
  .alert-error {
    background: #450a1a; color: #fb7185; border-radius: 10px;
    padding: 10px 14px; font-size: .83rem;
    display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
  }
  .alert-success {
    background: #0d2a1a; color: #4ade80; border-radius: 10px;
    padding: 10px 14px; font-size: .83rem;
    display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
  }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo"></div>
  <a href="{% url 'dashboard_paciente' %}"><i class="bi bi-house"></i>Inicio</a>
  <a href="{% url 'mis_citas_paciente' %}"><i class="bi bi-calendar-check"></i>Citas</a>
  <a href="{% url 'mi_historia' %}"><i class="bi bi-journal-medical"></i>Historia</a>
  <a href="{% url 'cambiar_password_paciente' %}" class="active"><i class="bi bi-shield-lock"></i>Seguridad</a>
  <a href="{% url 'logout' %}"><i class="bi bi-box-arrow-left"></i>Salir</a>
</nav>

<main class="main">
  <div>
    <h1 style="font-size:1.5rem; font-weight:700;">Seguridad</h1>
    <div style="font-size:.85rem; color:#64748b; margin-top:2px;">Cambia tu contraseña de acceso</div>
  </div>

  <div class="form-card">
    {% if messages %}
      {% for message in messages %}
        <div class="{% if 'error' in message.tags %}alert-error{% else %}alert-success{% endif %}">
          <i class="bi bi-{% if 'error' in message.tags %}exclamation-circle{% else %}check-circle{% endif %}"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" style="display:flex; flex-direction:column;">
      {% csrf_token %}
      <div class="form-group">
        <label>Contraseña actual</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" name="password_actual" placeholder="••••••••" required>
        </div>
      </div>
      <div class="form-group">
        <label>Nueva contraseña</label>
        <div class="input-wrap">
          <i class="bi bi-lock-fill"></i>
          <input type="password" name="password_nuevo" placeholder="Mínimo 6 caracteres" required>
        </div>
      </div>
      <div class="form-group">
        <label>Confirmar nueva contraseña</label>
        <div class="input-wrap">
          <i class="bi bi-shield-check"></i>
          <input type="password" name="password_confirm" placeholder="Repite la nueva contraseña" required>
        </div>
      </div>
      <button type="submit" class="btn-save">
        <i class="bi bi-check-lg"></i> Actualizar contraseña
      </button>
    </form>
  </div>
</main>
</body>
</html>
