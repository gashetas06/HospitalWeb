<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar Contraseña</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f172a; color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
    display: flex; height: 100vh; overflow: hidden;
  }
  .sidebar {
    width: 72px; background: #1e293b;
    display: flex; flex-direction: column;
    align-items: center; padding: 20px 0;
    gap: 8px; flex-shrink: 0;
  }
  .sidebar .logo { font-size: 1.6rem; margin-bottom: 16px; }
  .sidebar a {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #94a3b8; text-decoration: none;
    font-size: 0.55rem; gap: 3px;
    transition: background .2s, color .2s;
  }
  .sidebar a i { font-size: 1.2rem; }
  .sidebar a:hover { background: #334155; color: #f8fafc; }
  .sidebar a.active { background: #334155; color: #38bdf8; }

  .main {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
  }
  .form-card {
    background: #1e293b; border: 1px solid #334155;
    border-radius: 20px; padding: 36px;
    width: 100%; max-width: 440px;
  }
  .form-card h2 {
    font-size: 1.3rem; font-weight: 700;
    margin-bottom: 6px;
  }
  .form-card p {
    font-size: .85rem; color: #64748b;
    margin-bottom: 24px;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    font-size: .75rem; color: #64748b;
    text-transform: uppercase; letter-spacing: .06em;
    display: block; margin-bottom: 6px;
  }
  .input-wrap { position: relative; }
  .input-wrap i {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: #475569; font-size: 1rem;
  }
  .input-wrap input {
    width: 100%; background: #0f172a;
    border: 1px solid #334155; border-radius: 10px;
    padding: 12px 14px 12px 40px;
    color: #e2e8f0; font-size: .9rem;
    outline: none; transition: border .2s;
  }
  .input-wrap input:focus { border-color: #38bdf8; }

  .btn-guardar {
    background: #0ea5e9; color: white;
    border: none; border-radius: 12px;
    padding: 13px; font-size: .95rem;
    font-weight: 700; cursor: pointer;
    width: 100%; margin-top: 8px;
    display: flex; align-items: center;
    justify-content: center; gap: 8px;
    transition: background .2s;
  }
  .btn-guardar:hover { background: #0284c7; }

  .btn-cancelar {
    display: block; text-align: center;
    margin-top: 12px; color: #64748b;
    font-size: .85rem; text-decoration: none;
  }
  .btn-cancelar:hover { color: #e2e8f0; }

  .msg-error {
    background: #450a1a; color: #fb7185;
    border-radius: 10px; padding: 10px 14px;
    font-size: .83rem; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .msg-success {
    background: #14432a; color: #4ade80;
    border-radius: 10px; padding: 10px 14px;
    font-size: .83rem; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo"></div>
  <a href="{% url 'dashboard_medico' %}">
    <i class="bi bi-speedometer2"></i>Inicio
  </a>
  <a href="{% url 'mis_citas' %}">
    <i class="bi bi-calendar-check"></i>Citas
  </a>
  <a href="{% url 'mis_pacientes' %}">
    <i class="bi bi-person-heart"></i>Pacientes
  </a>
  <a href="{% url 'mis_internaciones' %}">
    <i class="bi bi-hospital"></i>Internados
  </a>
  <a href="{% url 'cambiar_password' %}"  class="active">
    <i class="bi bi-shield-lock"></i>Seguridad
  </a>
  <a href="{% url 'logout' %}">
    <i class="bi bi-box-arrow-left"></i>Salir
  </a>
</nav>


<main class="main">
  <div class="form-card">
    <h2>Cambiar contraseña</h2>
    <p>Ingresa tu contraseña actual y la nueva.</p>

    {% if messages %}
      {% for message in messages %}
        <div class="{% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">
          <i class="bi bi-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Contraseña actual</label>
        <div class="input-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" name="password_actual" required placeholder="••••••••">
        </div>
      </div>
      <div class="form-group">
        <label>Nueva contraseña</label>
        <div class="input-wrap">
          <i class="bi bi-lock-fill"></i>
          <input type="password" name="password_nuevo" required placeholder="••••••••">
        </div>
      </div>
      <div class="form-group">
        <label>Confirmar nueva contraseña</label>
        <div class="input-wrap">
          <i class="bi bi-shield-lock"></i>
          <input type="password" name="password_confirm" required placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="btn-guardar">
        <i class="bi bi-floppy"></i> Guardar contraseña
      </button>
      <a href="{% url 'dashboard_medico' %}" class="btn-cancelar">← Cancelar</a>
    </form>
  </div>
</main>

</body>
</html>
