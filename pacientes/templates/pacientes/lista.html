<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacientes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow">
<div class="container-fluid">
<span class="navbar-brand">Sistema Hospitalario</span>
</div>
</nav>

<div class="container mt-5">

<div class="card shadow border-0">

<div class="card-header bg-white d-flex justify-content-between align-items-center">
<h3 class="text-primary">Pacientes</h3>

<a href="/pacientes/nuevo" class="btn btn-success">
➕ Nuevo Paciente
</a>
</div>

<div class="card-body">

<input type="text" id="buscar" class="form-control mb-3" placeholder="Buscar paciente...">

<table class="table table-hover table-bordered" id="tablaPacientes">

<thead class="table-primary">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cédula</th>
<th>Sexo</th>
<th>Teléfono</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for p in pacientes %}
<tr>
<td>{{ p.idpaciente }}</td>
<td>{{ p.nombre }} {{ p.apellido }}</td>
<td>{{ p.cedula }}</td>
<td>{{ p.sexo }}</td>
<td>{{ p.telefono }}</td>

<td>
<a href="/pacientes/editar/{{ p.idpaciente }}/" class="btn btn-warning btn-sm">✏️ Editar</a>
<a href="/pacientes/eliminar/{{ p.idpaciente }}/"
class="btn btn-danger btn-sm"
onclick="return confirm('¿Eliminar paciente?')">
🗑 Eliminar
</a>
</td>

</tr>
{% endfor %}

</tbody>

</table>

</div>
</div>

</div>

<script>
document.getElementById("buscar").addEventListener("keyup", function() {
let filtro = this.value.toLowerCase();
let filas = document.querySelectorAll("#tablaPacientes tbody tr");

filas.forEach(fila => {
let texto = fila.textContent.toLowerCase();
fila.style.display = texto.includes(filtro) ? "" : "none";
});
});
</script>

</body>
</html>
